[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA-safe fallback (single-page app is pre-rendered, but this covers deep links)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
